name: build-windows-codex-local

on:
  workflow_dispatch:
    inputs:
      codex_ref:
        description: "openai/codex ref to build, for example rust-v0.142.5"
        required: true
        default: "rust-v0.142.5"
      reconnect_attempts:
        description: "Responses stream reconnect attempts to patch into codex.exe"
        required: true
        default: "100"

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  LIBSQLITE3_FLAGS: "SQLITE_DISABLE_INTRINSIC"

jobs:
  build:
    name: Build codex.exe
    runs-on: windows-latest
    timeout-minutes: 120
    permissions:
      contents: read
    defaults:
      run:
        working-directory: codex-rs

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: openai/codex
          ref: ${{ inputs.codex_ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-rs -> target

      - name: Patch stream reconnect retries
        shell: pwsh
        env:
          RECONNECT_ATTEMPTS: ${{ inputs.reconnect_attempts }}
        run: |
          $provider = "model-provider-info\src\lib.rs"
          $tests = "model-provider-info\src\model_provider_info_tests.rs"
          $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
          $attempts = [int]$env:RECONNECT_ATTEMPTS
          if ($attempts -lt 0) {
            throw "reconnect_attempts must be non-negative"
          }

          $providerContent = [IO.File]::ReadAllText((Resolve-Path $provider))
          $providerContent = [regex]::Replace($providerContent, "const DEFAULT_STREAM_MAX_RETRIES: u64 = \d+;", "const DEFAULT_STREAM_MAX_RETRIES: u64 = $attempts;")
          $providerContent = [regex]::Replace($providerContent, "const MAX_STREAM_MAX_RETRIES: u64 = \d+;", "const MAX_STREAM_MAX_RETRIES: u64 = $attempts;")
          if (-not $providerContent.Contains("const DEFAULT_STREAM_MAX_RETRIES: u64 = $attempts;")) {
            throw "Failed to patch DEFAULT_STREAM_MAX_RETRIES"
          }
          if (-not $providerContent.Contains("const MAX_STREAM_MAX_RETRIES: u64 = $attempts;")) {
            throw "Failed to patch MAX_STREAM_MAX_RETRIES"
          }
          [IO.File]::WriteAllText((Resolve-Path $provider), $providerContent, $utf8NoBom)

          $testContent = [IO.File]::ReadAllText((Resolve-Path $tests))
          if (-not $testContent.Contains("fn test_stream_max_retries_defaults_to_cap()")) {
            $insert = @(
              "#[test]",
              "fn test_stream_max_retries_defaults_to_cap() {",
              "    let provider = ModelProviderInfo::default();",
              "",
              "    assert_eq!(provider.stream_max_retries(), $attempts);",
              "}",
              "",
              "#[test]",
              "fn test_stream_max_retries_is_capped() {",
              "    let provider = ModelProviderInfo {",
              "        stream_max_retries: Some($attempts + 1),",
              "        ..ModelProviderInfo::default()",
              "    };",
              "",
              "    assert_eq!(provider.stream_max_retries(), $attempts);",
              "}",
              ""
            ) -join [Environment]::NewLine
            $marker = "#[test]`r`nfn test_supports_remote_compaction_for_openai()"
            if (-not $testContent.Contains($marker)) {
              $marker = "#[test]`nfn test_supports_remote_compaction_for_openai()"
            }
            if (-not $testContent.Contains($marker)) {
              throw "Failed to find insertion point for stream retry tests"
            }
            $testContent = $testContent.Replace($marker, $insert + $marker)
            [IO.File]::WriteAllText((Resolve-Path $tests), $testContent, $utf8NoBom)
          }

      - name: Verify stream retry default
        shell: pwsh
        run: cargo test -p codex-model-provider-info test_stream_max_retries --lib

      - name: Build release codex.exe
        shell: pwsh
        env:
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_DEBUG: "0"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
        run: cargo build -p codex-cli --bin codex --release

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item target\release\codex.exe artifact\codex.exe
          if (Test-Path target\release\codex.pdb) {
            Copy-Item target\release\codex.pdb artifact\codex.pdb
          }
          .\artifact\codex.exe --version

      - name: Upload codex.exe
        uses: actions/upload-artifact@v4
        with:
          name: codex-windows-x64-local
          path: codex-rs/artifact/*
          if-no-files-found: error
